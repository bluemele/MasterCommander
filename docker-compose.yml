services:
  mastercommander:
    build: .
    container_name: mastercommander
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:80"
    volumes:
      - ./auth:/app/auth
    depends_on:
      mastercommander-db:
        condition: service_healthy
    environment:
      MC_DB_HOST: mastercommander-db
      MC_DB_USER: mastercommander
      MC_DB_NAME: mastercommander
      MC_DB_PASS: ${MC_DB_PASS}
      MC_BOAT_API_KEY: ${MC_BOAT_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - coolify

  mastercommander-db:
    image: postgres:16-alpine
    container_name: mastercommander-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mastercommander
      POSTGRES_USER: mastercommander
      POSTGRES_PASSWORD: ${MC_DB_PASS}
    volumes:
      - mc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastercommander -d mastercommander"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coolify

volumes:
  mc_pgdata:
    external: true

networks:
  coolify:
    external: true
