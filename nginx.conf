server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'" always;

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block common vulnerability scanners and probes
    location ~* \.(php|asp|aspx|jsp|cgi|env|git|log|bak|sql|yml|yaml|toml|ini|conf|sh|pl)$ {
        return 404;
    }

    # Block paths that scanners love to probe
    location ~* ^/(wp-|wordpress|admin|administrator|phpmy|pma|\.env|\.git|cgi-bin|vendor|resources|node_modules|debug|console|actuator|api-docs) {
        return 404;
    }

    # Proxy telemetry API to Node.js backend
    location /api/telemetry {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }

    # Serve static files directly, fall back to index.html for SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
